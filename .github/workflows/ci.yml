name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  linux:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            cmake \
            extra-cmake-modules \
            fuse3 \
            git \
            kdbusaddons \
            ninja \
            pkgconf \
            qt6-base \
            qt6-declarative \
            qt6-tools \
            kirigami \
            kio \
            kstatusnotifieritem

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run tests
        run: cargo test --workspace

      - name: Run workspace check
        run: cargo run -p xtask -- check

      - name: Build UI
        run: cargo run -p xtask -- build-ui

      - name: Build integrations
        run: cargo run -p xtask -- build-integrations
