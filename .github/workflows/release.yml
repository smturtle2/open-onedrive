name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  linux-x86_64:
    runs-on: ubuntu-24.04
    container:
      image: archlinux:latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm \
            base-devel \
            cmake \
            extra-cmake-modules \
            fuse3 \
            git \
            github-cli \
            kdbusaddons \
            ninja \
            pkgconf \
            python \
            qt6-base \
            qt6-declarative \
            qt6-tools \
            kirigami \
            kio \
            kstatusnotifieritem

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run workspace tests
        run: cargo test --workspace

      - name: Verify version-linked files
        run: cargo run -p xtask -- sync-version --check

      - name: Build release artifacts
        run: |
          cargo build --workspace --release
          cmake -S ui -B build/ui-release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/ui-release
          cmake -S integrations -B build/integrations-release -G Ninja -DCMAKE_BUILD_TYPE=Release
          cmake --build build/integrations-release

      - name: Stage release payload
        run: |
          mkdir -p dist/open-onedrive-linux-x86_64
          cp target/release/openonedrived dist/open-onedrive-linux-x86_64/
          cp target/release/openonedrivectl dist/open-onedrive-linux-x86_64/
          cp build/ui-release/open-onedrive-ui dist/open-onedrive-linux-x86_64/
          cp build/ui-release/open-onedrive-tray dist/open-onedrive-linux-x86_64/
          cp build/integrations-release/plugins/kf6/kfileitemaction/libopen_onedrive_fileitemaction.so dist/open-onedrive-linux-x86_64/
          cp build/integrations-release/plugins/kf6/overlayicon/libopen_onedrive_overlayicon.so dist/open-onedrive-linux-x86_64/
          cp integrations/nautilus/src/openonedrive.py dist/open-onedrive-linux-x86_64/
          cp assets/open-onedrive.svg dist/open-onedrive-linux-x86_64/io.github.smturtle2.OpenOneDrive.svg
          tar -C dist -czf dist/open-onedrive-linux-x86_64.tar.gz open-onedrive-linux-x86_64
          (cd dist && sha256sum open-onedrive-linux-x86_64.tar.gz > open-onedrive-linux-x86_64.tar.gz.sha256)

      - name: Smoke test installer
        run: |
          smoke_home="$(mktemp -d)"
          fake_bin="$(mktemp -d)"
          bootstrap_bin="$(mktemp -d)"
          cat > "${fake_bin}/sudo" <<'EOF'
          #!/usr/bin/env bash
          if [[ "${1:-}" == "-v" ]]; then
            exit 0
          fi
          exec "$@"
          EOF
          cat > "${fake_bin}/pacman" <<'EOF'
          #!/usr/bin/env bash
          set -euo pipefail
          for arg in "$@"; do
            if [[ "$arg" == "rclone" ]]; then
              cat > "${OPEN_ONEDRIVE_SMOKE_RCLONE}" <<'EOS'
          #!/usr/bin/env bash
          exit 0
          EOS
              chmod +x "${OPEN_ONEDRIVE_SMOKE_RCLONE}"
              break
            fi
          done
          exit 0
          EOF
          chmod +x "${fake_bin}/sudo" "${fake_bin}/pacman"
          HOME="${smoke_home}" \
          PATH="${fake_bin}:${bootstrap_bin}:${PATH}" \
          OPEN_ONEDRIVE_SMOKE_RCLONE="${bootstrap_bin}/rclone" \
          OPEN_ONEDRIVE_RELEASE_BASE_URL="file://${PWD}/dist" \
          OPEN_ONEDRIVE_SKIP_FUSE_CHECK=1 \
          bash ./install.sh

          test -x "${bootstrap_bin}/rclone"
          test -x "${smoke_home}/.local/bin/open-onedrive"
          test -x "${smoke_home}/.local/bin/openonedrived"
          test -x "${smoke_home}/.local/bin/openonedrivectl"
          test -x "${smoke_home}/.local/lib/open-onedrive/open-onedrive-ui"
          test -x "${smoke_home}/.local/lib/open-onedrive/open-onedrive-tray"
          test -f "${smoke_home}/.local/share/nautilus-python/extensions/openonedrive.py"
          test -f "${smoke_home}/.config/systemd/user/openonedrived.service"
          test -f "${smoke_home}/.local/share/applications/io.github.smturtle2.OpenOneDrive.desktop"
          test -f "${smoke_home}/.local/lib/qt6/plugins/kf6/kfileitemaction/libopen_onedrive_fileitemaction.so"
          test -f "${smoke_home}/.local/lib/qt6/plugins/kf6/overlayicon/libopen_onedrive_overlayicon.so"

          cat > "${smoke_home}/.local/bin/openonedrived" <<'EOF'
          #!/usr/bin/env bash
          printf 'daemon %s\n' "$*" >> "${HOME}/launcher-daemon.log"
          sleep 2
          EOF
          chmod +x "${smoke_home}/.local/bin/openonedrived"
          cat > "${smoke_home}/.local/lib/open-onedrive/open-onedrive-ui" <<'EOF'
          #!/usr/bin/env bash
          printf 'ui %s\n' "$*" >> "${HOME}/launcher-ui.log"
          exit 0
          EOF
          chmod +x "${smoke_home}/.local/lib/open-onedrive/open-onedrive-ui"
          cat > "${smoke_home}/.local/lib/open-onedrive/open-onedrive-tray" <<'EOF'
          #!/usr/bin/env bash
          printf 'tray %s\n' "$*" >> "${HOME}/launcher-tray.log"
          sleep 2
          EOF
          chmod +x "${smoke_home}/.local/lib/open-onedrive/open-onedrive-tray"

          HOME="${smoke_home}" \
          PATH="${fake_bin}:${bootstrap_bin}:${PATH}" \
          "${smoke_home}/.local/bin/open-onedrive" --from-smoke

          test -f "${smoke_home}/launcher-daemon.log"
          test -f "${smoke_home}/launcher-tray.log"
          grep -- '--from-smoke' "${smoke_home}/launcher-ui.log"

          cat > "${smoke_home}/.local/bin/openonedrived" <<'EOF'
          #!/usr/bin/env bash
          trap 'exit 0' TERM INT
          while true; do
            sleep 1
          done
          EOF
          chmod +x "${smoke_home}/.local/bin/openonedrived"
          "${smoke_home}/.local/bin/openonedrived" &
          busy_daemon_pid="$!"
          sleep 1

          HOME="${smoke_home}" \
          PATH="${fake_bin}:${bootstrap_bin}:${PATH}" \
          OPEN_ONEDRIVE_SMOKE_RCLONE="${bootstrap_bin}/rclone" \
          OPEN_ONEDRIVE_RELEASE_BASE_URL="file://${PWD}/dist" \
          OPEN_ONEDRIVE_SKIP_FUSE_CHECK=1 \
          bash ./install.sh

          wait "${busy_daemon_pid}" || true
          test -x "${smoke_home}/.local/bin/openonedrived"

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release create "${tag}" \
              --repo "${GITHUB_REPOSITORY}" \
              --title "${tag}" \
              --generate-notes \
              --verify-tag
          fi

          gh release upload "${tag}" \
            --repo "${GITHUB_REPOSITORY}" \
            --clobber \
            dist/open-onedrive-linux-x86_64.tar.gz \
            dist/open-onedrive-linux-x86_64.tar.gz.sha256
