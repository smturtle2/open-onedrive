  <g>
    <rect x="876" y="506" width="316" height="136" rx="24" fill="#0C1830" stroke="#1E3357"/>
    <rect x="908" y="544" width="120" height="40" rx="20" fill="#4F7CFF"/>
    <text x="942" y="570" fill="white" font-family="Arial, sans-serif" font-size="18" font-weight="700">Mount</text>
    <rect x="1042" y="544" width="120" height="40" rx="20" fill="#22324B"/>
    <text x="1071" y="570" fill="#D7E0EE" font-family="Arial, sans-serif" font-size="18" font-weight="700">Retry</text>
  </g>

  <defs>
    <linearGradient id="bg" x1="96" y1="58" x2="1190" y2="666" gradientUnits="userSpaceOnUse">
      <stop stop-color="#13233E"/>
      <stop offset="1" stop-color="#0A1322"/>
    </linearGradient>
